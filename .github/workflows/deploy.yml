name: Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: lucasciotti.com.br
          username: deploy@lucasciotti.com.br
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/diagnostico-confirmacao/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
